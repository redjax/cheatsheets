---
debug: true
sheets_path: "~/.cheatsheets"

git:
  repo_url: "" # Optional, can be set to override the default repository URL
  clone_path: "" # Optional, can be set to specify where to clone the repository
  token: "" # Optional
  auto_branch: true # Automatically switch to machine-specific branch
  branch_prefix: "local" # Prefix for machine-specific branches (e.g., local-hostname)
  author_name: "" # Optional, falls back to git config user.name
  author_email: "" # Optional, falls back to git config user.email
